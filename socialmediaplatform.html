<!DOCTYPE html>
<html>
<head>

<title>ConnectHub - Mini Social Platform</title>

<style>

body{
font-family:Segoe UI;
background:#eef2f7;
margin:0;
}

header{
background:#1f3c88;
color:white;
padding:15px;
font-size:22px;
text-align:center;
font-weight:bold;
}

.container{
width:90%;
max-width:650px;
margin:auto;
margin-top:25px;
}

.card{
background:white;
padding:18px;
border-radius:10px;
margin-bottom:18px;
box-shadow:0px 4px 12px rgba(0,0,0,0.1);
}

h3{
margin-top:0;
}

input,textarea{
width:100%;
padding:10px;
margin-top:8px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

textarea{
resize:none;
height:70px;
}

button{
background:#1f3c88;
color:white;
border:none;
padding:8px 15px;
border-radius:6px;
cursor:pointer;
margin-top:8px;
}

button:hover{
background:#162c64;
}

.profile{
font-weight:bold;
color:#1f3c88;
font-size:15px;
}

.postText{
margin:10px 0;
font-size:15px;
}

.actions{
display:flex;
gap:15px;
font-size:14px;
}

.like{
cursor:pointer;
color:#e63946;
}

.commentBox{
margin-top:10px;
}

.comment{
font-size:13px;
background:#f1f3f6;
padding:6px;
border-radius:5px;
margin-top:5px;
}

.followBtn{
float:right;
background:#2a9d8f;
}

.followBtn:hover{
background:#21867a;
}

.userInfo{
margin-top:10px;
color:#555;
font-size:14px;
}

</style>

</head>

<body>

<header>
🌐 ConnectHub - Mini Social Media
</header>

<div class="container">

<div class="card">

<h3>User Login</h3>

<input id="username" placeholder="Enter username">

<button onclick="login()">Login</button>

<p id="currentUser" class="userInfo"></p>

</div>


<div class="card">

<h3>Create Post</h3>

<textarea id="postText" placeholder="Share something with the community..."></textarea>

<button onclick="createPost()">Publish</button>

</div>


<div id="posts"></div>

</div>


<script>

let currentUser=null
let posts=JSON.parse(localStorage.getItem("posts")) || []
let followers=JSON.parse(localStorage.getItem("followers")) || {}

function login(){

let name=document.getElementById("username").value

if(name==""){
alert("Please enter username")
return
}

currentUser=name

document.getElementById("currentUser").innerHTML="Logged in as: "+name

loadPosts()

}

function createPost(){

if(!currentUser){
alert("Login first")
return
}

let text=document.getElementById("postText").value

if(text==""){
alert("Post cannot be empty")
return
}

let post={
user:currentUser,
text:text,
likes:0,
comments:[]
}

posts.unshift(post)

localStorage.setItem("posts",JSON.stringify(posts))

document.getElementById("postText").value=""

loadPosts()

}

function likePost(index){

posts[index].likes++

localStorage.setItem("posts",JSON.stringify(posts))

loadPosts()

}

function addComment(index){

let comment=prompt("Enter your comment")

if(comment){

posts[index].comments.push(comment)

localStorage.setItem("posts",JSON.stringify(posts))

loadPosts()

}

}

function follow(user){

if(!currentUser){
alert("Login first")
return
}

if(!followers[user]){
followers[user]=[]
}

if(!followers[user].includes(currentUser)){
followers[user].push(currentUser)
}

localStorage.setItem("followers",JSON.stringify(followers))

alert("You followed "+user)

loadPosts()

}

function loadPosts(){

let container=document.getElementById("posts")

container.innerHTML=""

posts.forEach((p,i)=>{

let card=document.createElement("div")

card.className="card"

let followerCount=followers[p.user]?followers[p.user].length:0

card.innerHTML=`

<div class="profile">
👤 ${p.user}
<button class="followBtn" onclick="follow('${p.user}')">Follow</button>
</div>

<p class="postText">${p.text}</p>

<div class="actions">

<span class="like" onclick="likePost(${i})">❤️ ${p.likes}</span>

<span onclick="addComment(${i})" style="cursor:pointer">💬 Comment</span>

</div>

<p class="userInfo">Followers: ${followerCount}</p>

<div class="commentBox">

${p.comments.map(c=>`<div class="comment">💬 ${c}</div>`).join("")}

</div>

`

container.appendChild(card)

})

}

loadPosts()

</script>

</body>
</html>
